# Llama Stack Configuration
version: "2"
distro_name: rh
apis:
- responses
- datasetio
- files
- inference
- safety
- scoring
- tool_runtime
- vector_io
providers:
  inference:
  - provider_id: sentence-transformers
    provider_type: inline::sentence-transformers
    config: {}
  - provider_id: vllm-inference-1
    provider_type: remote::vllm
    config:
      api_token: ${env.VLLM_API_TOKEN_1:=fake}
      base_url: http://redhataiqwen3-8b-fp8-dynamic-predictor.ericsson-projects.svc.cluster.local:8080/v1
      max_tokens: ${env.VLLM_MAX_TOKENS:=4096}
      tls_verify: ${env.VLLM_TLS_VERIFY:=true}
  vector_io:
  - provider_id: milvus
    provider_type: inline::milvus
    config:
      db_path: /opt/app-root/src/.llama/distributions/rh/milvus.db
      persistence:
        backend: kv_default
        namespace: vector_io::milvus
  responses:
  - provider_id: builtin
    provider_type: inline::builtin
    config:
      persistence:
        agent_state:
          backend: kv_default
          namespace: agents
        responses:
          backend: sql_default
          max_write_queue_size: 10000
          num_writers: 4
          table_name: responses
  eval: []
  files:
  - provider_id: meta-reference-files
    provider_type: inline::localfs
    config:
      metadata_store:
        backend: sql_default
        table_name: files_metadata
      storage_dir: /opt/app-root/src/.llama/distributions/rh/files
  datasetio:
  - provider_id: huggingface
    provider_type: remote::huggingface
    config:
      kvstore:
        backend: kv_default
        namespace: datasetio::huggingface
  scoring:
  - provider_id: basic
    provider_type: inline::basic
    config: {}
  - provider_id: llm-as-judge
    provider_type: inline::llm-as-judge
    config: {}
  tool_runtime:
  - provider_id: file-search
    provider_type: inline::file-search
    config: {}
  - provider_id: model-context-protocol
    provider_type: remote::model-context-protocol
    config: {}
  safety: []
metadata_store:
  type: sqlite
  db_path: /opt/app-root/src/.llama/distributions/rh/inference_store.db
storage:
  backends:
    kv_default:
      db_path: /opt/app-root/src/.llama/distributions/rh/kvstore.db
      type: kv_sqlite
    sql_default:
      db_path: /opt/app-root/src/.llama/distributions/rh/sql_store.db
      type: sql_sqlite
  stores:
    conversations:
      backend: sql_default
      table_name: openai_conversations
    inference:
      backend: sql_default
      table_name: inference_store
    metadata:
      backend: kv_default
      namespace: registry
vector_stores:
  default_provider_id: milvus
  default_embedding_model:
    provider_id: sentence-transformers
    model_id: ibm-granite/granite-embedding-125m-english
registered_resources:
  models:
  - provider_id: sentence-transformers
    model_id: sentence-transformers/ibm-granite/granite-embedding-125m-english
    provider_model_id: ibm-granite/granite-embedding-125m-english
    model_type: embedding
    metadata:
      embedding_dimension: 768
  - provider_id: vllm-inference-1
    model_id: redhataiqwen3-8b-fp8-dynamic
    model_type: llm
    metadata:
      description: ""
      display_name: RedHatAI/Qwen3-8B-FP8-dynamic
  shields: []
  vector_stores: []
  datasets: []
  scoring_fns: []
  benchmarks: []
connectors:
- connector_id: k8s-ericsson
  connector_type: mcp
  url: http://mcp-server.ericsson-projects.svc.cluster.local:8080/sse
  server_label: K8s Ericsson
  server_name: k8s-ericsson
  server_description: "Kubernetes pod tools for ericsson-projects: list pods, get logs, get events"
server:
  port: 8321
